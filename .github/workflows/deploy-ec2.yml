name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22.13'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      # ── 1. PASO DE BUILD CON TODAS LAS VARIABLES DE ENTORNO ────────────────
      - name: Build Next.js (Export)
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
        run: npm run build

      # ── 2. DESPLIEGUE EN FIREBASE HOSTING ─────────────────────────────────
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_FACTURACION_7BDE0 }}
          channelId: live
          projectId: facturacion-7bde0

      # ── 3. ACTUALIZAR VERSIÓN EN FIRESTORE (NATIVO CON CURL) ──────────────
      - name: Actualizar versión en Firestore automáticamente
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_FACTURACION_7BDE0 }}
        run: |
          # 1. Creamos un archivo temporal con la credencial de la cuenta de servicio
          echo "$FIREBASE_SERVICE_ACCOUNT" > gcp-key.json
          
          # 2. Autenticamos y obtenemos un Access Token de Google oficial
          # Instalamos una mini herramienta nativa para firmar tokens JWT de Google
          sudo apt-get install -y jq
          
          # Inicializamos el SDK de Google Cloud que viene preinstalado en el Runner
          gcloud auth activate-service-account --key-file=gcp-key.json
          TOKEN=$(gcloud auth print-access-token)
          
          # 3. Guardamos el hash del commit actual de GitHub como versión
          VERSION_APP="${{ github.sha }}"
          echo "Actualizando versión en Firestore a: $VERSION_APP"
          
          # 4. Hacemos la mutación directa en Firestore usando la API REST corporativa de Google
          curl -X PATCH "https://firestore.googleapis.com/v1/projects/facturacion-7bde0/databases/(default)/documents/configuracion/version_app?updateMask.fieldPaths=version" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"fields\": {\"version\": {\"stringValue\": \"$VERSION_APP\"}}}"
            
          # Limpieza por seguridad
          rm gcp-key.json