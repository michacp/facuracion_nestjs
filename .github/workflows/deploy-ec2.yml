name: Deploy NestJS to EC2

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Actualizar código y Desplegar en EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT }}
          script: |
            set -e  # Si cualquier comando falla, detener el script

            # 1. Navegar al proyecto
            cd /home/ubuntu/proyects/vffac/backend-nestjs

            # 2. Cargar NVM/Node antes de cualquier comando npm
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

            # 3. Actualizar repositorio
            echo "📥 Trayendo los últimos cambios de Git..."
            git fetch --all
            git reset --hard origin/main

            # 4. Instalar dependencias
            echo "📦 Instalando dependencias..."
            npm install

            # 5. Generar cliente Prisma
            echo "🔄 Generando cliente de Prisma..."
            npx prisma generate

            # 6. Compilar con SWC
            echo "🏗️ Compilando el proyecto con SWC..."
            npx nest build --path tsconfig.build.json --builder swc

            # 7. Despliegue en PM2
            # Se sube el límite a 400MB para evitar los crasheos por OOM
            echo "🚀 Reiniciando aplicación en PM2..."
            if pm2 describe vffac-nestjs > /dev/null 2>&1; then
              pm2 restart vffac-nestjs --update-env
            else
              pm2 start dist/main.js --name "vffac-nestjs" --node-args="--max-old-space-size=400" --update-env
            fi

            # 8. Guardar estado PM2
            pm2 save

            echo "✅ ¡Despliegue completado con éxito!"